<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>鴿舍管家 · 全功能版</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',system-ui,sans-serif; }
    body { background:#f5f0e8; display:flex; justify-content:center; align-items:flex-start; min-height:100vh; padding:16px; font-size:18px; }  /* 基礎字體放大 */
    .app { max-width:600px; width:100%; background:#fffef9; border-radius:24px; padding:20px; box-shadow:0 10px 25px rgba(0,0,0,0.06); }
    h1 { font-size:2rem; color:#4a3b2f; margin-bottom:8px; }
    .sub { color:#7b6e5d; font-size:1rem; margin-bottom:16px; display:flex; justify-content:space-between; flex-wrap:wrap; }
    .stats { background:#f0eadb; border-radius:20px; padding:6px 16px; font-weight:600; color:#4a3b2f; font-size:1rem; }
    .tab-bar { display:flex; gap:6px; background:#f0eadb; border-radius:40px; padding:6px; margin-bottom:16px; flex-wrap:wrap; }
    .tab { flex:1 0 auto; text-align:center; padding:14px 8px; font-weight:700; font-size:1rem; border-radius:30px; background:transparent; border:none; color:#5e4e3a; cursor:pointer; }
    .tab.active { background:#fff; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
    .panel { display:none; }
    .panel.active { display:block; }
    .card { background:#fff; border-radius:16px; padding:16px; margin-bottom:16px; border:1px solid #ede3cf; }
    label { font-size:1rem; font-weight:600; color:#7a6a55; display:block; margin-bottom:6px; }
    input, select { width:100%; padding:14px; border:1px solid #dbcfb8; border-radius:14px; font-size:1.1rem; background:#fefcf7; margin-bottom:12px; }
    .btn { background:#3e3629; color:#fff; border:none; border-radius:30px; padding:14px; font-weight:700; width:100%; font-size:1.1rem; cursor:pointer; margin-top:6px; }
    .btn-outline { background:#f2e7d5; color:#3e3629; border:1px solid #ccbc9c; }
    .btn-sm { width:auto; padding:8px 18px; font-size:1rem; margin:4px; }
    .btn-danger { background:#c44; color:#fff; border:none; }
    .item { background:#faf7f0; border-radius:14px; padding:16px; margin-bottom:10px; border-left:5px solid #c8a96e; font-size:1rem; position:relative; }
    .item-actions { position:absolute; top:8px; right:8px; display:flex; gap:6px; }
    .icon-btn { background:none; border:none; font-size:1.4rem; cursor:pointer; padding:4px; }
    .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:100; justify-content:center; align-items:center; }
    .modal { background:#fff; border-radius:20px; padding:24px; width:95%; max-width:600px; max-height:80vh; overflow-y:auto; }
    .modal h3 { font-size:1.4rem; margin-bottom:12px; }
    .pin-box { text-align:center; margin-top:40px; }
    .pin-box input { text-align:center; font-size:1.8rem; letter-spacing:8px; }
    .table-scroll { overflow-x:auto; margin-bottom:12px; }
    table { width:100%; border-collapse:collapse; font-size:1rem; }
    th, td { border:1px solid #ddd; padding:6px; text-align:center; }
    td input, td select { width:100%; min-width:60px; margin-bottom:0; padding:6px; font-size:1rem; border-radius:6px; }
    td select { padding:4px; }
    .del-chick { padding:4px 10px; font-size:0.9rem; margin:0; }
    .row-flex { display:flex; gap:10px; align-items:center; }
    .row-flex select { flex:1; margin-bottom:0; }
    .search-hint { font-size:0.9rem; color:#888; margin-top:4px; }
    .pedigree-list-item { cursor:pointer; }
    .pedigree-list-item:hover { background:#efe8db; }
    .search-select-item { cursor:pointer; padding:8px; border-bottom:1px solid #eee; }
    .search-select-item:hover { background:#e8e0d0; }
    .yellow-red { background:#ffff88; color:#cc0000; font-weight:bold; padding:2px 6px; border-radius:4px; }
    .btn-small { padding:6px 12px; font-size:0.9rem; }
  </style>
</head>
<body>
<div class="app" id="appRoot"></div>

<script>
  (function() {
    // ----- 安全轉義 -----
    function escapeHtml(str) {
      if (!str) return '';
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return String(str).replace(/[&<>"']/g, function(m) { return map[m]; });
    }

    // ----- 常數與全域 -----
    const APP_PASSWORD = "5678";
    const STORAGE_KEY = "pigeon_loft_full_v7";
    let appData = {
      pigeons: [],
      pairs: [],
      medications: [],
      trainings: []
    };
    let unlocked = false;

    // ----- 資料操作 -----
    function loadData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try { appData = JSON.parse(saved); } catch(e) { initDefault(); }
      } else { initDefault(); }
    }
    function initDefault() {
      appData = {
        pigeons: [
          { ring:'2020-基石雄', name:'基石雄', year:'2020', sex:'公', color:'灰', eye:'黃眼', strain:'詹森', note:'基礎種雄', race:'', rank:'', sire:'', dam:'' },
          { ring:'2020-基石雌', name:'基石雌', year:'2020', sex:'母', color:'斑', eye:'砂眼', strain:'凡布利安娜', note:'基礎種雌', race:'', rank:'', sire:'', dam:'' },
          { ring:'2022-閃電號', name:'閃電號', year:'2022', sex:'公', color:'銀', eye:'黃眼', strain:'混合', note:'直子', race:'春季大賽', rank:'冠軍', sire:'2020-基石雄', dam:'2020-基石雌' }
        ],
        pairs: [
          { id:'p1', maleRing:'2020-基石雄', femaleRing:'2020-基石雌', date:'2023-02-14', nestBox:'A-01',
            grandSire:'', grandDam:'', grandSireOut:'', grandDamOut:'',
            chicks: [
              { seq:1, birthDate:'2023-03-20', year:'2023', ring:'2023-001', color:'灰', sex:'公', eye:'黃眼', strain:'', race:'', rank:'', note:'' }
            ]
          }
        ],
        medications: [],
        trainings: []
      };
      saveData();
    }
    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }

    function findPigeon(q) {
      if (!q) return null;
      return appData.pigeons.find(p => p.ring === q || p.name === q);
    }

    // ----- 統計更新 -----
    function updateStats() {
      const statsEl = document.getElementById('statsDisplay');
      if (!statsEl) return;
      const total = appData.pigeons.length;
      const male = appData.pigeons.filter(p => p.sex === '公').length;
      const female = appData.pigeons.filter(p => p.sex === '母').length;
      statsEl.textContent = `總數: ${total} ｜ 公: ${male} ｜ 母: ${female}`;
    }

    // ----- 通用鴿子搜尋選擇器（彈窗） -----
    function showPigeonSelector(title, callback) {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.style.display = 'flex';
      overlay.innerHTML = `
        <div class="modal">
          <h3>${escapeHtml(title)}</h3>
          <input type="text" id="selectorSearch" placeholder="🔍 輸入環號或關鍵字" style="font-size:1.2rem;">
          <div id="selectorResults" style="max-height:300px; overflow-y:auto; margin-top:10px;"></div>
          <div style="display:flex; gap:8px; margin-top:16px;">
            <button class="btn-outline btn-sm" id="selectorCancel">取消</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);

      const searchInput = overlay.querySelector('#selectorSearch');
      const resultsDiv = overlay.querySelector('#selectorResults');

      function performSelectorSearch() {
        const q = searchInput.value.trim();
        if (!q) {
          resultsDiv.innerHTML = '<div style="padding:8px;color:#888;">請輸入查詢條件</div>';
          return;
        }
        // 先嘗試精確
        const exact = findPigeon(q);
        let list = [];
        if (exact) {
          list = [exact];
        } else {
          const lower = q.toLowerCase();
          list = appData.pigeons.filter(p => {
            const fields = [p.year, p.name, p.sex, p.color, p.eye, p.race, p.rank, p.ring, p.strain, p.note];
            return fields.some(f => f && f.toLowerCase().includes(lower));
          });
        }
        if (list.length === 0) {
          resultsDiv.innerHTML = '<div style="padding:8px;color:#c44;">❌ 找不到符合的鴿子</div>';
          return;
        }
        let html = '';
        list.forEach(p => {
          html += `
            <div class="search-select-item" data-ring="${escapeHtml(p.ring)}">
              <strong>${escapeHtml(p.ring)}</strong> (${escapeHtml(p.year||'')}) ${escapeHtml(p.name)} | ${escapeHtml(p.sex)} | ${escapeHtml(p.color)} | ${escapeHtml(p.eye)}
              <br><small>血統:${escapeHtml(p.strain||'')} | 賽事:${escapeHtml(p.race||'-')}</small>
            </div>
          `;
        });
        resultsDiv.innerHTML = html;
        resultsDiv.querySelectorAll('.search-select-item').forEach(el => {
          el.addEventListener('click', function() {
            const ring = this.dataset.ring;
            const pigeon = findPigeon(ring);
            if (pigeon) {
              callback(pigeon);
              overlay.remove();
            }
          });
        });
      }

      searchInput.addEventListener('input', performSelectorSearch);
      overlay.querySelector('#selectorCancel').addEventListener('click', ()=> overlay.remove());
      overlay.addEventListener('click', (e)=>{ if(e.target === overlay) overlay.remove(); });
      // 自動聚焦
      setTimeout(()=> searchInput.focus(), 100);
    }

    // ----- 主畫面渲染 -----
    function renderApp() {
      if (!unlocked) {
        document.getElementById('appRoot').innerHTML = `
          <div class="pin-box">
            <h1>🕊️ 鴿舍管家</h1>
            <p style="color:#7b6e5d; font-size:1.2rem;">請輸入管理密碼</p>
            <input type="password" id="pinInput" placeholder="····" maxlength="10" style="font-size:1.8rem;">
            <button class="btn" id="loginBtn" style="margin-top:12px; font-size:1.2rem;">進入系統</button>
            <p style="font-size:1rem; color:#aaa;">預設密碼：1234</p>
          </div>
        `;
        document.getElementById('loginBtn').addEventListener('click', ()=>{
          if(document.getElementById('pinInput').value === APP_PASSWORD) { unlocked = true; renderApp(); }
          else alert('密碼錯誤');
        });
        return;
      }

      document.getElementById('appRoot').innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <h1>🕊️ 鴿舍管家</h1>
          <button class="btn-outline" id="logoutBtn" style="width:auto; padding:10px 20px; font-size:1rem;">鎖定</button>
        </div>
        <div class="sub">
          <span style="font-size:1.1rem;">全功能管理系統</span>
          <span class="stats" id="statsDisplay"></span>
        </div>
        <div class="tab-bar" id="tabBar"></div>
        <div id="panelContainer"></div>
      `;

      const tabs = [
        { key:'pigeons', label:'🐦 鴿子' },
        { key:'pedigree', label:'📋 血統' },
        { key:'pairing', label:'💞 配對' },
        { key:'medication', label:'💊 藥物' },
        { key:'training', label:'🚀 訓放' },
        { key:'backup', label:'💾 備份' }
      ];
      const tabBar = document.getElementById('tabBar');
      tabs.forEach(t => {
        const btn = document.createElement('button');
        btn.className = 'tab';
        btn.dataset.tab = t.key;
        btn.textContent = t.label;
        tabBar.appendChild(btn);
      });
      tabBar.firstChild.classList.add('active');
      const panelContainer = document.getElementById('panelContainer');
      panelContainer.innerHTML = `
        <div class="panel active" id="panelPigeons"></div>
        <div class="panel" id="panelPedigree"></div>
        <div class="panel" id="panelPairing"></div>
        <div class="panel" id="panelMedication"></div>
        <div class="panel" id="panelTraining"></div>
        <div class="panel" id="panelBackup"></div>
      `;

      bindTabEvents();
      renderPigeonsPanel();
      renderPedigreePanel();
      renderPairingPanel();
      renderMedicationPanel();
      renderTrainingPanel();
      renderBackupPanel();
      updateStats();
      document.getElementById('logoutBtn').addEventListener('click', ()=>{ unlocked = false; renderApp(); });
    }

    function bindTabEvents() {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', ()=>{
          document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
          tab.classList.add('active');
          document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
          const panelId = 'panel' + tab.dataset.tab.charAt(0).toUpperCase() + tab.dataset.tab.slice(1);
          document.getElementById(panelId).classList.add('active');
        });
      });
    }

    // ----- 工具：模態對話框 -----
    function showModal(title, htmlContent, onSave) {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.style.display = 'flex';
      overlay.innerHTML = `<div class="modal"><h3>${escapeHtml(title)}</h3><div id="modalContent">${htmlContent}</div>
        <div style="display:flex; gap:8px; margin-top:16px;">
          <button class="btn-outline btn-sm" id="modalCancel" style="font-size:1rem;">取消</button>
          <button class="btn btn-sm" id="modalSave" style="font-size:1rem;">儲存</button>
        </div></div>`;
      document.body.appendChild(overlay);
      document.getElementById('modalCancel').addEventListener('click', ()=> overlay.remove());
      document.getElementById('modalSave').addEventListener('click', ()=>{
        if(onSave) onSave();
        overlay.remove();
      });
      overlay.addEventListener('click', (e)=>{ if(e.target === overlay) overlay.remove(); });
    }

    // ===== 鴿子面板（含編號、黃底紅字、查看幼鴿） =====
    function renderPigeonsPanel() {
      const panel = document.getElementById('panelPigeons');
      panel.innerHTML = `
        <div class="card">
          <button class="btn" id="addPigeonBtn">➕ 新增鴿子</button>
        </div>
        <div id="pigeonList"></div>
      `;
      renderPigeonList();
      document.getElementById('addPigeonBtn').addEventListener('click', ()=> editPigeonDialog(null));
    }

    function renderPigeonList() {
      const list = document.getElementById('pigeonList');
      let html = '';
      appData.pigeons.forEach((p, index) => {
        const seq = index + 1;
        html += `
          <div class="item">
            <div class="item-actions">
              <button class="icon-btn edit-pigeon" data-ring="${escapeHtml(p.ring)}">✏️</button>
              <button class="icon-btn del-pigeon" data-ring="${escapeHtml(p.ring)}">🗑️</button>
              <button class="icon-btn view-children" data-ring="${escapeHtml(p.ring)}" title="查看子女">🔍幼鴿</button>
            </div>
            <strong><span class="yellow-red">#${seq} ${escapeHtml(p.ring)}</span></strong> (${escapeHtml(p.year||'')}) ${escapeHtml(p.name)} | ${escapeHtml(p.sex||'')} | ${escapeHtml(p.color||'')} | ${escapeHtml(p.eye||'')}<br>
            <small>血統:${escapeHtml(p.strain||'')} | 賽事:${escapeHtml(p.race||'-')} | 名次:${escapeHtml(p.rank||'-')}</small><br>
            <small>備註:${escapeHtml(p.note||'')}</small>
          </div>
        `;
      });
      list.innerHTML = html;

      // 編輯
      list.querySelectorAll('.edit-pigeon').forEach(b => b.addEventListener('click', ()=>{
        const pigeon = findPigeon(b.dataset.ring);
        if(pigeon) editPigeonDialog(pigeon);
      }));
      // 刪除
      list.querySelectorAll('.del-pigeon').forEach(b => b.addEventListener('click', ()=>{
        if(confirm('刪除鴿子 '+b.dataset.ring+' ？')) {
          appData.pigeons = appData.pigeons.filter(p => p.ring !== b.dataset.ring);
          saveData(); renderPigeonList(); updateStats();
        }
      }));
      // 查看子女
      list.querySelectorAll('.view-children').forEach(b => b.addEventListener('click', ()=>{
        const ring = b.dataset.ring;
        const children = appData.pigeons.filter(p => p.sire === ring || p.dam === ring);
        if (children.length === 0) {
          alert('此鴿暫無子女記錄');
          return;
        }
        let msg = `🕊️ ${ring} 的子女：\n`;
        children.forEach(c => {
          msg += `${c.ring} (${c.year||''}) ${c.name} | ${c.sex} | ${c.color}\n`;
        });
        alert(msg);
      }));
    }

    function editPigeonDialog(pigeon=null) {
      const isNew = !pigeon;
      const title = isNew ? '新增鴿子' : '編輯鴿子';
      const ring = isNew ? '' : pigeon.ring;
      const year = isNew ? '' : (pigeon.year || '');
      const name = isNew ? '' : pigeon.name;
      const sex = pigeon?.sex || '公';
      const color = pigeon?.color || '';
      const eye = pigeon?.eye || '';
      const strain = pigeon?.strain || '';
      const race = pigeon?.race || '';
      const rank = pigeon?.rank || '';
      const note = pigeon?.note || '';
      const sire = pigeon?.sire || '';
      const dam = pigeon?.dam || '';

      showModal(title, `
        <label>年份</label><input id="pYear" value="${escapeHtml(year)}" placeholder="例如 2024">
        <label>足環號碼</label><input id="pRing" value="${escapeHtml(ring)}" ${isNew ? '' : 'readonly'}>
        <label>暱稱</label><input id="pName" value="${escapeHtml(name)}">
        <label>性別</label><select id="pSex">
          <option ${sex==='公'?'selected':''}>公</option>
          <option ${sex==='母'?'selected':''}>母</option>
        </select>
        <label>羽色</label><input id="pColor" value="${escapeHtml(color)}">
        <label>眼砂</label><input id="pEye" value="${escapeHtml(eye)}">
        <label>血統</label><input id="pStrain" value="${escapeHtml(strain)}">
        <label>賽事</label><input id="pRace" value="${escapeHtml(race)}">
        <label>獲獎名次</label><input id="pRank" value="${escapeHtml(rank)}">
        <label>父鴿環號</label><input id="pSire" value="${escapeHtml(sire)}">
        <label>母鴿環號</label><input id="pDam" value="${escapeHtml(dam)}">
        <label>備註</label><input id="pNote" value="${escapeHtml(note)}">
      `, ()=>{
        const pYear = document.getElementById('pYear').value.trim();
        const pRing = document.getElementById('pRing').value.trim();
        if(!pRing) return alert('足環號碼必填');
        if(isNew && findPigeon(pRing)) return alert('此環號已存在');
        const pName = document.getElementById('pName').value.trim() || pRing;
        const pSex = document.getElementById('pSex').value;
        const pColor = document.getElementById('pColor').value.trim();
        const pEye = document.getElementById('pEye').value.trim();
        const pStrain = document.getElementById('pStrain').value.trim();
        const pRace = document.getElementById('pRace').value.trim();
        const pRank = document.getElementById('pRank').value.trim();
        const pSire = document.getElementById('pSire').value.trim();
        const pDam = document.getElementById('pDam').value.trim();
        const pNote = document.getElementById('pNote').value.trim();

        if (isNew) {
          appData.pigeons.push({
            ring: pRing, name: pName, year: pYear, sex: pSex,
            color: pColor, eye: pEye, strain: pStrain, race: pRace, rank: pRank, note: pNote,
            sire: pSire, dam: pDam
          });
        } else {
          pigeon.year = pYear;
          pigeon.name = pName;
          pigeon.sex = pSex;
          pigeon.color = pColor;
          pigeon.eye = pEye;
          pigeon.strain = pStrain;
          pigeon.race = pRace;
          pigeon.rank = pRank;
          pigeon.note = pNote;
          pigeon.sire = pSire;
          pigeon.dam = pDam;
        }
        saveData(); renderPigeonList(); renderPedigreePanel(); updateStats();
      });
    }

    // ===== 血統面板（搜尋） =====
    function renderPedigreePanel() {
      const panel = document.getElementById('panelPedigree');
      panel.innerHTML = `
        <div class="card">
          <input type="text" id="searchInput" placeholder="🔍 輸入足環號碼（精確）或任意關鍵字搜尋" style="font-size:1.2rem;">
          <div class="search-hint">支援：年份、暱稱、性別、羽色、眼砂、賽事、名次</div>
        </div>
        <div id="pedigreeView"><div class="card" style="font-size:1rem;">請輸入查詢條件</div></div>
      `;
      document.getElementById('searchInput').addEventListener('input', function() {
        const q = this.value.trim();
        if (!q) {
          document.getElementById('pedigreeView').innerHTML = '<div class="card" style="font-size:1rem;">請輸入查詢條件</div>';
          return;
        }
        const exact = findPigeon(q);
        if (exact) {
          showPedigreeTree(exact);
          return;
        }
        const results = performSearch(q);
        if (results.length === 0) {
          document.getElementById('pedigreeView').innerHTML = '<div class="card" style="font-size:1rem;">❌ 找不到符合的鴿子</div>';
        } else {
          showSearchResults(results);
        }
      });
    }

    function performSearch(keyword) {
      const lower = keyword.toLowerCase();
      return appData.pigeons.filter(p => {
        const fields = [p.year, p.name, p.sex, p.color, p.eye, p.race, p.rank, p.ring, p.strain, p.note];
        return fields.some(f => f && f.toLowerCase().includes(lower));
      });
    }

    function showSearchResults(results) {
      const view = document.getElementById('pedigreeView');
      let html = `<div class="card" style="font-size:1rem;">🔍 找到 ${results.length} 筆符合的鴿子</div>`;
      results.forEach((p, idx) => {
        html += `
          <div class="item pedigree-list-item">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <div>
                <strong>${escapeHtml(p.ring)}</strong> (${escapeHtml(p.year||'')}) ${escapeHtml(p.name)} | ${escapeHtml(p.sex||'')} | ${escapeHtml(p.color||'')} | ${escapeHtml(p.eye||'')}
                <br><small>血統:${escapeHtml(p.strain||'')} | 賽事:${escapeHtml(p.race||'-')} | 名次:${escapeHtml(p.rank||'-')}</small>
              </div>
              <button class="btn-sm btn-outline view-pedigree-btn" data-ring="${escapeHtml(p.ring)}" style="font-size:0.9rem;">🔍 查看血統</button>
            </div>
          </div>
        `;
      });
      view.innerHTML = html;
      view.querySelectorAll('.view-pedigree-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const ring = this.dataset.ring;
          const pigeon = findPigeon(ring);
          if (pigeon) showPedigreeTree(pigeon);
        });
      });
    }

    function showPedigreeTree(pigeon) {
      const view = document.getElementById('pedigreeView');
      const tree = buildTree(pigeon);
      view.innerHTML = `<div class="card" style="font-size:1rem;"><strong>${escapeHtml(pigeon.ring)}</strong> (${escapeHtml(pigeon.year||'')}) 血統樹</div>`;
      renderTree(tree, view);
    }

    function buildTree(p, depth=0, max=3) {
      if(!p || depth>max) return null;
      return { p, depth, sire: buildTree(findPigeon(p.sire), depth+1, max), dam: buildTree(findPigeon(p.dam), depth+1, max) };
    }

    function renderTree(node, parent) {
      if(!node) return;
      const div = document.createElement('div');
      div.className = 'item';
      div.style.marginLeft = (node.depth*12)+'px';
      div.innerHTML = `
        <strong>${escapeHtml(node.p.ring)}</strong> (${escapeHtml(node.p.year||'')}) ${escapeHtml(node.p.sex)} | ${escapeHtml(node.p.color)} | ${escapeHtml(node.p.eye)}<br>
        <small>血統:${escapeHtml(node.p.strain||'')} | 父:${escapeHtml(node.p.sire||'基礎')} 母:${escapeHtml(node.p.dam||'基礎')}</small>
      `;
      parent.appendChild(div);
      if(node.sire) renderTree(node.sire, parent);
      if(node.dam) renderTree(node.dam, parent);
    }

    // ===== 配對面板（含搜尋選擇） =====
    function renderPairingPanel() {
      const panel = document.getElementById('panelPairing');
      panel.innerHTML = `
        <div class="card">
          <button class="btn" id="addPairBtn">➕ 新增配對</button>
        </div>
        <div id="pairList"></div>
      `;
      renderPairList();
      document.getElementById('addPairBtn').addEventListener('click', ()=> editPairDialog(null));
    }

    function renderPairList() {
      const list = document.getElementById('pairList');
      let html = '';
      appData.pairs.forEach(p => {
        const male = findPigeon(p.maleRing);
        const female = findPigeon(p.femaleRing);
        html += `
          <div class="item">
            <div class="item-actions">
              <button class="icon-btn edit-pair" data-id="${escapeHtml(p.id)}">✏️</button>
              <button class="icon-btn del-pair" data-id="${escapeHtml(p.id)}">🗑️</button>
            </div>
            <strong>${escapeHtml(p.maleRing)}(${escapeHtml(male?.color||'')})</strong> ❤️ <strong>${escapeHtml(p.femaleRing)}(${escapeHtml(female?.color||'')})</strong><br>
            📅 ${escapeHtml(p.date)} | 🏠 ${escapeHtml(p.nestBox)}<br>
            <small>祖父:${escapeHtml(p.grandSire||'無')} 祖母:${escapeHtml(p.grandDam||'無')} | 外祖父:${escapeHtml(p.grandSireOut||'無')} 外祖母:${escapeHtml(p.grandDamOut||'無')}</small><br>
            幼鴿:${p.chicks?.length||0}羽 <button class="btn-sm btn-outline chicks-btn" data-id="${escapeHtml(p.id)}" style="font-size:0.9rem;">管理幼鴿</button>
          </div>
        `;
      });
      list.innerHTML = html;

      list.querySelectorAll('.edit-pair').forEach(b => b.addEventListener('click', ()=>{
        const pair = appData.pairs.find(p => p.id === b.dataset.id);
        if(pair) editPairDialog(pair);
      }));
      list.querySelectorAll('.del-pair').forEach(b => b.addEventListener('click', ()=>{
        if(confirm('刪除配對？')) { appData.pairs = appData.pairs.filter(p => p.id !== b.dataset.id); saveData(); renderPairList(); }
      }));
      list.querySelectorAll('.chicks-btn').forEach(b => b.addEventListener('click', ()=>{
        const pair = appData.pairs.find(p => p.id === b.dataset.id);
        if(pair) manageChicksDialog(pair);
      }));
    }

    // 編輯配對（含搜尋按鈕）
    function editPairDialog(pair=null) {
      const isNew = !pair;
      const existingNest = pair?.nestBox || 'A-01';
      const [nestAlpha, nestNum] = existingNest.includes('-') ? existingNest.split('-') : ['A','01'];
      const title = isNew ? '新增配對' : '編輯配對';
      const maleRing = pair?.maleRing || '';
      const femaleRing = pair?.femaleRing || '';

      showModal(title, `
        <label>公鴿環號</label>
        <div style="display:flex; gap:6px; align-items:center;">
          <input id="pMaleRing" value="${escapeHtml(maleRing)}" style="flex:1;">
          <button class="btn-sm btn-outline" id="searchMaleBtn" style="width:auto; font-size:1rem;">🔍</button>
        </div>
        <label>母鴿環號</label>
        <div style="display:flex; gap:6px; align-items:center;">
          <input id="pFemaleRing" value="${escapeHtml(femaleRing)}" style="flex:1;">
          <button class="btn-sm btn-outline" id="searchFemaleBtn" style="width:auto; font-size:1rem;">🔍</button>
        </div>
        <label>祖父環號</label><input id="pGrandSire" value="${escapeHtml(pair?.grandSire||'')}">
        <label>祖母環號</label><input id="pGrandDam" value="${escapeHtml(pair?.grandDam||'')}">
        <label>外祖父環號</label><input id="pGrandSireOut" value="${escapeHtml(pair?.grandSireOut||'')}">
        <label>外祖母環號</label><input id="pGrandDamOut" value="${escapeHtml(pair?.grandDamOut||'')}">
        <label>配對日期</label><input type="date" id="pDate" value="${escapeHtml(pair?.date||'')}">
        <label>巢箱</label>
        <div class="row-flex">
          <select id="pNestAlpha">
            ${[...Array(26)].map((_,i)=> `<option value="${String.fromCharCode(65+i)}" ${String.fromCharCode(65+i)===nestAlpha?'selected':''}>${String.fromCharCode(65+i)}</option>`).join('')}
          </select>
          <span>-</span>
          <select id="pNestNum">
            ${[...Array(9)].map((_,i)=> `<option value="${String(i+1).padStart(2,'0')}" ${String(i+1).padStart(2,'0')===nestNum?'selected':''}>${i+1}</option>`).join('')}
          </select>
        </div>
      `, ()=>{
        // 獲取公母環號
        const mRing = document.getElementById('pMaleRing').value.trim();
        const fRing = document.getElementById('pFemaleRing').value.trim();
        if(!mRing||!fRing) return alert('公母鴿環號必填');
        const alpha = document.getElementById('pNestAlpha').value;
        const num = document.getElementById('pNestNum').value;
        const nestBox = alpha + '-' + num;
        const obj = {
          id: pair?.id || 'p'+Date.now(),
          maleRing: mRing,
          femaleRing: fRing,
          date: document.getElementById('pDate').value,
          nestBox: nestBox,
          grandSire: document.getElementById('pGrandSire').value.trim(),
          grandDam: document.getElementById('pGrandDam').value.trim(),
          grandSireOut: document.getElementById('pGrandSireOut').value.trim(),
          grandDamOut: document.getElementById('pGrandDamOut').value.trim(),
          chicks: pair?.chicks || []
        };
        if(isNew) appData.pairs.push(obj);
        else Object.assign(pair, obj);
        saveData(); renderPairList();
      });

      // 綁定搜尋按鈕（必須在模態框出現後）
      setTimeout(() => {
        const maleInput = document.getElementById('pMaleRing');
        const femaleInput = document.getElementById('pFemaleRing');
        document.getElementById('searchMaleBtn').addEventListener('click', ()=>{
          showPigeonSelector('選擇公鴿', (pigeon) => {
            maleInput.value = pigeon.ring;
          });
        });
        document.getElementById('searchFemaleBtn').addEventListener('click', ()=>{
          showPigeonSelector('選擇母鴿', (pigeon) => {
            femaleInput.value = pigeon.ring;
          });
        });
      }, 100);
    }

    // ----- 幼鴿管理（新增時同步到鴿子列表） -----
    function manageChicksDialog(pair) {
      const maleRing = pair.maleRing || '?';
      const femaleRing = pair.femaleRing || '?';
      let html = `<h3 style="font-size:1.3rem;">幼鴿管理 - ${escapeHtml(maleRing)} x ${escapeHtml(femaleRing)}</h3>`;
      html += `<div class="table-scroll"><table>
        <thead><tr>
          <th style="font-size:1rem;">序號</th><th style="font-size:1rem;">年份</th><th style="font-size:1rem;">足環號碼</th><th style="font-size:1rem;">性別</th><th style="font-size:1rem;">羽色</th><th style="font-size:1rem;">眼砂</th><th style="font-size:1rem;">血統</th>
          <th style="font-size:1rem;">賽事</th><th style="font-size:1rem;">獲獎名次</th><th style="font-size:1rem;">備註</th><th></th>
        </tr></thead><tbody>`;

      pair.chicks.forEach((c) => {
        html += `
          <tr data-seq="${c.seq}">
            <td><span class="cSeqSpan">${c.seq}</span></td>
            <td><input value="${escapeHtml(c.year||'')}" class="cYear"></td>
            <td><input value="${escapeHtml(c.ring||'')}" class="cRing"></td>
            <td><select class="cSex">
              <option ${c.sex==='公'?'selected':''}>公</option>
              <option ${c.sex==='母'?'selected':''}>母</option>
            </select></td>
            <td><input value="${escapeHtml(c.color||'')}" class="cColor"></td>
            <td><input value="${escapeHtml(c.eye||'')}" class="cEye"></td>
            <td><input value="${escapeHtml(c.strain||'')}" class="cStrain"></td>
            <td><input value="${escapeHtml(c.race||'')}" class="cRace"></td>
            <td><input value="${escapeHtml(c.rank||'')}" class="cRank"></td>
            <td><input value="${escapeHtml(c.note||'')}" class="cNote"></td>
            <td><button class="btn-sm btn-danger del-chick">✕</button></td>
          </tr>
        `;
      });

      html += `</tbody></table></div>`;

      const maxSeq = pair.chicks.reduce((m, c) => Math.max(m, parseInt(c.seq)||0), 0);
      const canAdd = maxSeq < 10;
      if (canAdd) {
        html += `<button class="btn btn-sm" id="addChickRow" style="font-size:1rem;">➕ 新增幼鴿</button>`;
      } else {
        html += `<p style="color:#c44; font-size:1rem;">已達10筆上限</p>`;
      }

      showModal('幼鴿管理', html, () => {
        const tbody = document.querySelector('#modalContent tbody');
        if (!tbody) return;
        const rows = tbody.querySelectorAll('tr');
        const newChicks = [];
        let seqCounter = 1;
        rows.forEach(row => {
          const ring = row.querySelector('.cRing')?.value?.trim() || '';
          if (!ring) return;
          const year = row.querySelector('.cYear')?.value || '';
          const sex = row.querySelector('.cSex')?.value || '公';
          const color = row.querySelector('.cColor')?.value || '';
          const eye = row.querySelector('.cEye')?.value || '';
          const strain = row.querySelector('.cStrain')?.value || '';
          const race = row.querySelector('.cRace')?.value || '';
          const rank = row.querySelector('.cRank')?.value || '';
          const note = row.querySelector('.cNote')?.value || '';
          const oldSeq = parseInt(row.dataset.seq) || 0;
          const oldChick = pair.chicks.find(c => c.seq === oldSeq);
          const birthDate = oldChick ? oldChick.birthDate : '';
          // 同步添加到鴿子列表（若尚未存在）
          if (!findPigeon(ring)) {
            appData.pigeons.push({
              ring: ring,
              name: ring,
              year: year,
              sex: sex,
              color: color,
              eye: eye,
              strain: strain,
              race: race,
              rank: rank,
              note: note,
              sire: pair.maleRing,
              dam: pair.femaleRing
            });
          }
          newChicks.push({ seq: seqCounter++, birthDate, year, ring, sex, color, eye, strain, race, rank, note });
        });
        pair.chicks = newChicks;
        saveData();
        renderPairList();
        renderPigeonList();
        updateStats();
        // 血統面板重新搜尋可略
      });

      setTimeout(() => {
        document.querySelectorAll('#modalContent .del-chick').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            btn.closest('tr').remove();
          });
        });
        const addBtn = document.getElementById('addChickRow');
        if (addBtn) {
          addBtn.addEventListener('click', () => {
            const tbody = document.querySelector('#modalContent tbody');
            if (!tbody) return;
            const rows = tbody.querySelectorAll('tr');
            const maxSeqNow = rows.length;
            const newSeq = maxSeqNow + 1;
            if (newSeq > 10) return;
            const newRow = document.createElement('tr');
            newRow.dataset.seq = newSeq;
            newRow.innerHTML = `
              <td><span class="cSeqSpan">${newSeq}</span></td>
              <td><input class="cYear"></td>
              <td><input class="cRing"></td>
              <td><select class="cSex"><option>公</option><option>母</option></select></td>
              <td><input class="cColor"></td>
              <td><input class="cEye"></td>
              <td><input class="cStrain"></td>
              <td><input class="cRace"></td>
              <td><input class="cRank"></td>
              <td><input class="cNote"></td>
              <td><button class="btn-sm btn-danger del-chick">✕</button></td>
            `;
            tbody.appendChild(newRow);
            newRow.querySelector('.del-chick').addEventListener('click', () => newRow.remove());
            if (newSeq >= 10) addBtn.remove();
          });
        }
      }, 100);
    }

    // ===== 藥物面板 =====
    function renderMedicationPanel() {
      const panel = document.getElementById('panelMedication');
      panel.innerHTML = `
        <div class="card">
          <label>足環號碼</label><input id="medRing" style="font-size:1.2rem;">
          <div class="row-flex">
            <div style="flex:1"><label>開始日期</label><input type="date" id="medStartDate" style="font-size:1.2rem;"></div>
            <div style="flex:1"><label>結束日期</label><input type="date" id="medEndDate" style="font-size:1.2rem;"></div>
          </div>
          <label>事由</label><input id="medReason" style="font-size:1.2rem;">
          <label>處方</label><input id="medPrescription" style="font-size:1.2rem;">
          <label>劑量</label><input id="medDosage" style="font-size:1.2rem;">
          <label>結果</label><input id="medResult" style="font-size:1.2rem;">
          <button class="btn" id="saveMedBtn" style="font-size:1.1rem;">記錄</button>
        </div>
        <div id="medList"></div>
      `;
      renderMedList();
      document.getElementById('saveMedBtn').addEventListener('click', ()=>{
        const ring = document.getElementById('medRing').value.trim();
        const startDate = document.getElementById('medStartDate').value;
        const endDate = document.getElementById('medEndDate').value;
        const reason = document.getElementById('medReason').value.trim();
        const prescription = document.getElementById('medPrescription').value.trim();
        const dosage = document.getElementById('medDosage').value.trim();
        const result = document.getElementById('medResult').value.trim();
        if(!ring || !startDate) return alert('請至少填寫足環號碼與開始日期');
        appData.medications.push({ ring, startDate, endDate, reason, prescription, dosage, result });
        saveData(); renderMedList();
        ['medRing','medStartDate','medEndDate','medReason','medPrescription','medDosage','medResult'].forEach(id => document.getElementById(id).value='');
      });
    }

    function renderMedList() {
      const list = document.getElementById('medList');
      let html = '<h3 style="font-size:1.2rem;">藥物記錄</h3>';
      appData.medications.slice().reverse().forEach((m, idx) => {
        html += `
          <div class="item">
            <strong>${escapeHtml(m.ring)}</strong><br>
            🗓️ ${escapeHtml(m.startDate || '?')} ～ ${escapeHtml(m.endDate || '?')}<br>
            📌 事由: ${escapeHtml(m.reason || '-')} | 處方: ${escapeHtml(m.prescription || '-')}<br>
            💊 劑量: ${escapeHtml(m.dosage || '-')} | 結果: ${escapeHtml(m.result || '-')}
            <button class="icon-btn del-med" data-index="${idx}" style="float:right;">🗑️</button>
          </div>
        `;
      });
      list.innerHTML = html;
      list.querySelectorAll('.del-med').forEach(btn => {
        btn.addEventListener('click', ()=>{
          const idx = parseInt(btn.dataset.index);
          const realIdx = appData.medications.length - 1 - idx;
          appData.medications.splice(realIdx, 1);
          saveData(); renderMedList();
        });
      });
    }

    // ===== 訓放面板 =====
    function renderTrainingPanel() {
      const panel = document.getElementById('panelTraining');
      panel.innerHTML = `
        <div class="card">
          <label>訓放次數</label><select id="tSession" style="font-size:1.2rem;"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option></select>
          <label>訓放地點</label><input id="tLocation" style="font-size:1.2rem;">
          <label>訓放時間</label><input type="datetime-local" id="tTime" style="font-size:1.2rem;">
          <hr>
          <div id="tEntries"></div>
          <button class="btn btn-sm" id="addEntryBtn" style="font-size:1rem;">➕ 新增鴿子記錄</button>
          <button class="btn" id="saveTrainingBtn" style="margin-top:8px; font-size:1.1rem;">儲存本次訓放</button>
        </div>
        <div id="trainingList"></div>
      `;
      let tempEntries = [];
      function renderEntries() {
        const container = document.getElementById('tEntries');
        let html = '';
        tempEntries.forEach((e,i) => {
          html += `
            <div class="chick-row" style="display:flex; gap:6px; align-items:center; margin-bottom:6px;">
              <input placeholder="環號" value="${escapeHtml(e.ring)}" class="eRing" style="flex:1; font-size:1rem; padding:8px;">
              <select class="eSex" style="font-size:1rem; padding:8px;"><option ${e.sex==='公'?'selected':''}>公</option><option ${e.sex==='母'?'selected':''}>母</option></select>
              <input placeholder="羽色" value="${escapeHtml(e.color)}" class="eColor" style="flex:1; font-size:1rem; padding:8px;">
              <input type="time" value="${escapeHtml(e.returnTime)}" class="eReturn" placeholder="24h" style="flex:1; font-size:1rem; padding:8px;">
              <button class="btn-sm btn-danger del-entry" style="font-size:1rem;">✕</button>
            </div>
          `;
        });
        container.innerHTML = html;
        container.querySelectorAll('.del-entry').forEach(b => b.addEventListener('click', (e)=>{
          const row = b.closest('.chick-row');
          const idx = Array.from(row.parentNode.children).indexOf(row);
          tempEntries.splice(idx,1); renderEntries();
        }));
      }
      renderEntries();
      document.getElementById('addEntryBtn').addEventListener('click', ()=>{
        tempEntries.push({ ring:'', sex:'公', color:'', returnTime:'' });
        renderEntries();
      });
      document.getElementById('saveTrainingBtn').addEventListener('click', ()=>{
        const session = document.getElementById('tSession').value;
        const location = document.getElementById('tLocation').value.trim();
        const time = document.getElementById('tTime').value;
        if(!location||!time) return alert('請填地點時間');
        const entries = [];
        document.querySelectorAll('#tEntries .chick-row').forEach(row => {
          const ring = row.querySelector('.eRing').value.trim();
          if(ring) entries.push({
            ring, sex: row.querySelector('.eSex').value, color: row.querySelector('.eColor').value, returnTime: row.querySelector('.eReturn').value
          });
        });
        appData.trainings.push({ id:'t'+Date.now(), session, location, time, entries });
        saveData(); renderTrainingList();
        document.getElementById('tLocation').value=''; document.getElementById('tTime').value='';
        tempEntries = []; renderEntries();
      });
      renderTrainingList();
    }

    function renderTrainingList() {
      const list = document.getElementById('trainingList');
      let html = '<h3 style="font-size:1.2rem;">訓放紀錄</h3>';
      appData.trainings.slice().reverse().forEach(t => {
        html += `<div class="item">
          <strong>第${escapeHtml(t.session)}次</strong> | ${escapeHtml(t.location)} | ${escapeHtml(t.time)}
          <button class="icon-btn del-train" data-id="${escapeHtml(t.id)}" style="float:right;">🗑️</button>
          <div class="table-scroll"><table><tr><th>環號</th><th>性別</th><th>羽色</th><th>歸巢時間</th></tr>
          ${t.entries.map(e => `<tr><td>${escapeHtml(e.ring)}</td><td>${escapeHtml(e.sex)}</td><td>${escapeHtml(e.color)}</td><td>${escapeHtml(e.returnTime)}</td></tr>`).join('')}
          </table></div>
        </div>`;
      });
      list.innerHTML = html;
      list.querySelectorAll('.del-train').forEach(b => b.addEventListener('click', ()=>{
        appData.trainings = appData.trainings.filter(t => t.id !== b.dataset.id);
        saveData(); renderTrainingList();
      }));
    }

    // ===== 備份面板 =====
    function renderBackupPanel() {
      document.getElementById('panelBackup').innerHTML = `
        <div class="card">
          <button class="btn" id="exportBtn" style="font-size:1.1rem;">📤 下載備份</button>
        </div>
        <div class="card">
          <input type="file" id="importFile" accept=".json" style="font-size:1.1rem;">
          <button class="btn btn-outline" id="importBtn" style="font-size:1.1rem;">📥 還原資料</button>
        </div>
      `;
      document.getElementById('exportBtn').addEventListener('click', ()=>{
        const blob = new Blob([JSON.stringify(appData, null, 2)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `鴿舍備份_${new Date().toISOString().slice(0,10)}.json`; a.click();
      });
      document.getElementById('importBtn').addEventListener('click', ()=>{
        const f = document.getElementById('importFile').files[0];
        if(!f) return alert('請選檔案');
        const reader = new FileReader();
        reader.onload = e => {
          try {
            const data = JSON.parse(e.target.result);
            if(data.pigeons && data.pairs) {
              appData = data; saveData(); alert('還原成功'); renderApp();
            } else alert('格式不符');
          } catch(ex) { alert('讀取失敗'); }
        };
        reader.readAsText(f);
      });
    }

    // 啟動
    loadData();
    renderApp();
  })();
</script>
</body>
</html>
