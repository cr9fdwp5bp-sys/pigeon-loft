<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>鴿舍管家 · 簡易版</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',system-ui,sans-serif; }
    body { background:#f5f0e8; display:flex; justify-content:center; align-items:flex-start; min-height:100vh; padding:16px; }
    .app { max-width:500px; width:100%; background:#fffef9; border-radius:24px; padding:20px; box-shadow:0 10px 25px rgba(0,0,0,0.06); }
    h1 { font-size:1.6rem; color:#4a3b2f; margin-bottom:8px; }
    .sub { color:#7b6e5d; font-size:0.8rem; margin-bottom:16px; }
    .tab-bar { display:flex; gap:4px; background:#f0eadb; border-radius:30px; padding:4px; margin-bottom:16px; }
    .tab { flex:1; text-align:center; padding:10px; font-weight:600; font-size:0.85rem; border-radius:26px; background:transparent; border:none; color:#5e4e3a; }
    .tab.active { background:#fff; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
    .panel { display:none; }
    .panel.active { display:block; }
    .card { background:#fff; border-radius:16px; padding:14px; margin-bottom:12px; border:1px solid #ede3cf; }
    label { font-size:0.75rem; font-weight:600; color:#7a6a55; display:block; margin-bottom:4px; }
    input { width:100%; padding:12px; border:1px solid #dbcfb8; border-radius:14px; font-size:0.95rem; background:#fefcf7; margin-bottom:10px; }
    .btn { background:#3e3629; color:#fff; border:none; border-radius:25px; padding:12px; font-weight:700; width:100%; font-size:0.95rem; cursor:pointer; margin-top:4px; }
    .btn-outline { background:#f2e7d5; color:#3e3629; border:1px solid #ccbc9c; }
    .item { background:#faf7f0; border-radius:14px; padding:12px; margin-bottom:8px; border-left:5px solid #c8a96e; font-size:0.9rem; }
    .pin-box { text-align:center; margin-top:40px; }
    .pin-box input { text-align:center; font-size:1.4rem; letter-spacing:8px; }
    .hidden { display:none; }
  </style>
</head>
<body>
<div class="app" id="appRoot"></div>

<script>
  // ========== 設定區（可自行修改） ==========
  const APP_PASSWORD = "1234";   // 登入密碼，改成你想要的
  // =========================================

  const STORAGE_KEY = "pigeon_loft_data_v2";
  let appData = { pigeons: [], pairs: [], nests: [] };
  let unlocked = false;

  // 初始化資料
  function loadData() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try { appData = JSON.parse(saved); } catch(e) { resetData(); }
    } else {
      resetData();
    }
  }
  function resetData() {
    appData = {
      pigeons: [
        { id:'2020-基石雄', name:'基石雄', ring:'2020-基石雄', sire:'', dam:'', note:'基礎種雄' },
        { id:'2020-基石雌', name:'基石雌', ring:'2020-基石雌', sire:'', dam:'', note:'基礎種雌' },
        { id:'2022-閃電號', name:'閃電號', ring:'2022-閃電號', sire:'2020-基石雄', dam:'2020-基石雌', note:'直子' }
      ],
      pairs: [
        { id:'p1', male:'2020-基石雄', female:'2020-基石雌', date:'2023-02-14', nestBox:'A-01' }
      ],
      nests: [
        { nestId:'A-01', pigeon:'2020-基石雄 & 2020-基石雌', location:'左區上層' }
      ]
    };
    saveData();
  }
  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
  }

  // 找鴿子
  function findPigeon(q) {
    return appData.pigeons.find(p => p.ring===q || p.name===q || p.id===q);
  }

  // 血統樹
  function buildTree(p, depth=0, max=3) {
    if(!p || depth>max) return null;
    return {
      p, depth,
      sire: buildTree(findPigeon(p.sire), depth+1, max),
      dam: buildTree(findPigeon(p.dam), depth+1, max)
    };
  }

  // 畫面切換
  function renderApp() {
    if (!unlocked) {
      document.getElementById('appRoot').innerHTML = `
        <div class="pin-box">
          <h1>🕊️ 鴿舍管家</h1>
          <p style="color:#7b6e5d; margin-bottom:20px;">請輸入管理密碼</p>
          <input type="password" id="pinInput" placeholder="····" maxlength="10">
          <button class="btn" id="loginBtn" style="margin-top:12px;">進入系統</button>
          <p style="font-size:0.7rem; color:#aaa; margin-top:20px;">預設密碼：1234</p>
        </div>
      `;
      document.getElementById('loginBtn').addEventListener('click', ()=>{
        if(document.getElementById('pinInput').value === APP_PASSWORD) {
          unlocked = true;
          renderApp();
        } else {
          alert('密碼錯誤');
        }
      });
      return;
    }

    // 主畫面
    document.getElementById('appRoot').innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>🕊️ 鴿舍管家</h1>
        <button class="btn-outline" id="logoutBtn" style="width:auto; padding:8px 16px; font-size:0.8rem;">鎖定</button>
      </div>
      <div class="sub">直系血統 · 配對 · 巢箱</div>
      <div class="tab-bar">
        <button class="tab active" data-tab="pedigree">📋 血統</button>
        <button class="tab" data-tab="pairing">💞 配對</button>
        <button class="tab" data-tab="nest">📦 巢箱</button>
        <button class="tab" data-tab="backup">💾 備份</button>
      </div>

      <div class="panel active" id="panelPedigree">
        <input type="text" id="searchInput" placeholder="🔍 輸入鴿環號查血統">
        <div id="pedigreeView"></div>
        <button class="btn-outline" id="addPigeonBtn">➕ 新增種鴿</button>
      </div>

      <div class="panel" id="panelPairing">
        <div class="card">
          <label>雄鴿</label><input id="maleInput" placeholder="環號">
          <label>雌鴿</label><input id="femaleInput" placeholder="環號">
          <label>日期</label><input type="date" id="pairDate">
          <label>巢箱</label><input id="pairNest" placeholder="A-03">
          <button class="btn" id="savePairBtn">儲存配對</button>
        </div>
        <div id="pairList"></div>
      </div>

      <div class="panel" id="panelNest">
        <div class="card">
          <label>巢箱編號</label><input id="nestId" placeholder="B-12">
          <label>鴿子</label><input id="nestPigeon" placeholder="鴿子或配對">
          <label>位置</label><input id="nestLoc" placeholder="南面牆">
          <button class="btn" id="saveNestBtn">更新巢箱</button>
        </div>
        <div id="nestList"></div>
      </div>

      <div class="panel" id="panelBackup">
        <div class="card">
          <p style="font-weight:700; margin-bottom:10px;">📤 匯出備份</p>
          <button class="btn" id="exportBtn">下載備份檔案 (JSON)</button>
          <p style="font-size:0.7rem; color:#8b7a62; margin-top:8px;">建議存在雲端硬碟或電腦</p>
        </div>
        <div class="card">
          <p style="font-weight:700; margin-bottom:10px;">📥 匯入還原</p>
          <input type="file" id="importFile" accept=".json" style="margin-bottom:6px;">
          <button class="btn-outline" id="importBtn">還原資料</button>
          <p style="font-size:0.7rem; color:#c44; margin-top:6px;">⚠️ 會覆蓋目前所有資料</p>
        </div>
      </div>
    `;

    bindEvents();
    refreshAllViews();
  }

  function bindEvents() {
    // 頁籤切換
    document.querySelectorAll('.tab').forEach(t => {
      t.addEventListener('click', ()=>{
        document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
        t.classList.add('active');
        document.getElementById('panel'+t.dataset.tab.charAt(0).toUpperCase()+t.dataset.tab.slice(1)).classList.add('active');
      });
    });
    // 鎖定
    document.getElementById('logoutBtn').addEventListener('click', ()=>{
      unlocked = false;
      renderApp();
    });
    // 查血統
    document.getElementById('searchInput').addEventListener('input', e => showPedigree(e.target.value));
    document.getElementById('addPigeonBtn').addEventListener('click', addPigeon);
    // 配對
    document.getElementById('savePairBtn').addEventListener('click', ()=>{
      const m = document.getElementById('maleInput').value.trim();
      const f = document.getElementById('femaleInput').value.trim();
      if(!m||!f) return alert('請填雄雌鴿');
      appData.pairs.push({
        id:'p'+Date.now(),
        male:m, female:f,
        date: document.getElementById('pairDate').value || new Date().toISOString().split('T')[0],
        nestBox: document.getElementById('pairNest').value.trim()
      });
      saveData();
      renderPairList();
      ['maleInput','femaleInput','pairDate','pairNest'].forEach(id=>document.getElementById(id).value='');
    });
    // 巢箱
    document.getElementById('saveNestBtn').addEventListener('click', ()=>{
      const id = document.getElementById('nestId').value.trim();
      if(!id) return alert('請輸入巢箱編號');
      const entry = {
        nestId: id,
        pigeon: document.getElementById('nestPigeon').value.trim(),
        location: document.getElementById('nestLoc').value.trim()
      };
      const idx = appData.nests.findIndex(n=>n.nestId===id);
      if(idx!==-1) appData.nests[idx]=entry; else appData.nests.push(entry);
      saveData();
      renderNestList();
      ['nestId','nestPigeon','nestLoc'].forEach(id=>document.getElementById(id).value='');
    });
    // 匯出
    document.getElementById('exportBtn').addEventListener('click', ()=>{
      const blob = new Blob([JSON.stringify(appData, null, 2)], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `鴿舍備份_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
    });
    // 匯入
    document.getElementById('importBtn').addEventListener('click', ()=>{
      const fileInput = document.getElementById('importFile');
      if(!fileInput.files.length) return alert('請選擇備份檔案');
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if(data.pigeons && data.pairs && data.nests) {
            appData = data;
            saveData();
            refreshAllViews();
            alert('還原成功！');
          } else {
            alert('檔案格式不正確');
          }
        } catch(ex) { alert('讀取失敗'); }
      };
      reader.readAsText(fileInput.files[0]);
    });
  }

  function showPedigree(q) {
    const container = document.getElementById('pedigreeView');
    if(!q) { container.innerHTML='<div class="card">請輸入鴿子編號</div>'; return; }
    const p = findPigeon(q);
    if(!p) { container.innerHTML='<div class="card">❌ 找不到</div>'; return; }
    const tree = buildTree(p);
    container.innerHTML = `<div class="card"><strong>${p.ring}</strong> 血統</div>`;
    renderTree(tree, container);
  }
  function renderTree(node, parent) {
    if(!node) return;
    const div = document.createElement('div');
    div.className = 'item';
    div.style.marginLeft = node.depth*10+'px';
    div.innerHTML = `<strong>${node.p.ring}</strong> ${node.p.note||''}<br><small>父:${node.p.sire||'基礎'} 母:${node.p.dam||'基礎'}</small>`;
    parent.appendChild(div);
    if(node.sire) renderTree(node.sire, parent);
    if(node.dam) renderTree(node.dam, parent);
  }
  function addPigeon() {
    const ring = prompt('鴿環號/名稱：','2024-新鴿');
    if(!ring) return;
    if(findPigeon(ring)) return alert('已存在');
    appData.pigeons.push({ id:ring, name:ring, ring, sire:'', dam:'', note:'' });
    saveData();
    document.getElementById('searchInput').value = ring;
    showPedigree(ring);
  }

  function renderPairList() {
    const list = document.getElementById('pairList');
    if(list) list.innerHTML = appData.pairs.slice().reverse().map(p=>`<div class="item">${p.male} ❤️ ${p.female}<br>📅 ${p.date} | 🏠 ${p.nestBox||''}</div>`).join('');
  }
  function renderNestList() {
    const list = document.getElementById('nestList');
    if(list) list.innerHTML = appData.nests.map(n=>`<div class="item"><strong>📦 ${n.nestId}</strong> | ${n.pigeon||'空'}<br>📍 ${n.location||''}</div>`).join('');
  }
  function refreshAllViews() {
    renderPairList();
    renderNestList();
    showPedigree(document.getElementById('searchInput')?.value || '');
  }

  // 啟動
  loadData();
  renderApp();
</script>
</body>
</html>
