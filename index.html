<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover, shrink-to-fit=no">
  <title>鴿舍管家 · 長輩友善版</title>
  <style>
    /* 全局重置與大字體設定 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      font-size: 18px; /* 基礎字體放大 */
      -webkit-text-size-adjust: 100%; /* 防止Safari自動縮放字體 */
      touch-action: manipulation; /* 防止雙擊縮放 */
    }
    body {
      background: #f5f0e8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #3e3629;
      line-height: 1.5;
    }
    .app {
      max-width: 500px; /* 稍微縮小最大寬度，適應手機 */
      width: 100%;
      background: #fffef9;
      border-radius: 28px;
      padding: 18px 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    /* 標題與統計 */
    h1 {
      font-size: 2.2rem;
      color: #3e3629;
      margin-bottom: 10px;
      letter-spacing: 0.02em;
      text-align: center;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }
    .stats-box {
      background: #f0eadb;
      border-radius: 30px;
      padding: 10px 20px;
      font-weight: 700;
      font-size: 1.1rem;
      color: #3e3629;
      text-align: center;
      width: 100%;
    }

    /* 導航標籤 (大按鈕) */
    .tab-bar {
      display: flex;
      gap: 6px;
      background: #f0eadb;
      border-radius: 40px;
      padding: 6px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .tab {
      flex: 1 0 auto;
      text-align: center;
      padding: 14px 8px;
      font-weight: 700;
      font-size: 1rem;
      border-radius: 30px;
      background: transparent;
      border: none;
      color: #5e4e3a;
      cursor: pointer;
      transition: 0.2s;
      min-width: 60px;
      white-space: nowrap;
    }
    .tab.active {
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      color: #3e3629;
    }

    /* 面板 */
    .panel {
      display: none;
    }
    .panel.active {
      display: block;
    }

    /* 卡片容器 */
    .card {
      background: #fff;
      border-radius: 22px;
      padding: 18px 16px;
      margin-bottom: 16px;
      border: 1px solid #ede3cf;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }

    /* 表單元素 (大尺寸) */
    label {
      font-size: 1.1rem;
      font-weight: 700;
      color: #5e4e3a;
      display: block;
      margin-bottom: 6px;
    }
    input, select, textarea {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #dbcfb8;
      border-radius: 16px;
      font-size: 1.2rem;
      background: #fefcf7;
      margin-bottom: 14px;
      font-family: inherit;
      color: #3e3629;
      -webkit-appearance: none;
      appearance: none;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #c8a96e;
      box-shadow: 0 0 0 3px rgba(200,169,110,0.2);
    }

    /* 按鈕 (大尺寸) */
    .btn {
      background: #3e3629;
      color: #fff;
      border: none;
      border-radius: 30px;
      padding: 16px 22px;
      font-weight: 800;
      width: 100%;
      font-size: 1.2rem;
      cursor: pointer;
      margin-top: 6px;
      transition: 0.2s;
      text-align: center;
      letter-spacing: 0.03em;
      min-height: 54px; /* 確保觸摸目標夠大 */
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn:active {
      background: #2f2a20;
      transform: scale(0.98);
    }
    .btn-outline {
      background: #f2e7d5;
      color: #3e3629;
      border: 2px solid #ccbc9c;
    }
    .btn-outline:active {
      background: #e8dcc8;
    }
    .btn-sm {
      width: auto;
      padding: 10px 18px;
      font-size: 1rem;
      margin: 4px;
      min-height: 44px;
    }
    .btn-xs {
      width: auto;
      padding: 6px 12px;
      font-size: 1rem;
      border-radius: 12px;
      margin: 2px;
      min-height: 38px;
    }
    .btn-danger {
      background: #c44;
      color: #fff;
      border: none;
    }
    .btn-danger:active {
      background: #a33;
    }

    /* 列表項目 (增加內邊距，防止重疊) */
    .pigeon-item, .pair-item, .med-item {
      background: #faf7f0;
      border-radius: 18px;
      padding: 18px 20px;
      margin-bottom: 12px;
      border-left: 6px solid #c8a96e;
      font-size: 1.1rem;
      position: relative;
      word-break: break-word;
    }
    .item-actions {
      position: absolute;
      top: 10px;
      right: 12px;
      display: flex;
      gap: 6px;
    }
    .icon-btn {
      background: rgba(255,255,255,0.9);
      border: 1px solid #ccc;
      font-size: 1.4rem;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 14px;
      line-height: 1;
      min-width: 44px;
      text-align: center;
    }
    .icon-btn:active {
      background: #e0d8c8;
    }

    /* 模態框 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .modal-overlay.open {
      display: flex;
    }
    .modal {
      background: #fff;
      border-radius: 28px;
      padding: 24px 20px;
      width: 100%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .modal h3 {
      font-size: 1.6rem;
      margin-bottom: 16px;
      color: #3e3629;
      text-align: center;
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .modal-actions .btn, .modal-actions .btn-outline {
      flex: 1;
    }

    /* 表格 (簡單滾動) */
    .table-scroll {
      overflow-x: auto;
      margin-bottom: 10px;
      border-radius: 16px;
      border: 1px solid #ede3cf;
      -webkit-overflow-scrolling: touch;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 1rem;
      min-width: 480px;
    }
    th, td {
      border: 1px solid #e8e0d0;
      padding: 10px 6px;
      text-align: center;
      white-space: nowrap;
    }
    th {
      background: #faf7f0;
      font-weight: 700;
      color: #5e4e3a;
      font-size: 1rem;
    }
    td button {
      padding: 6px 10px;
      font-size: 0.9rem;
      margin: 2px;
    }

    /* 輔助文字 */
    .highlight-ring {
      background: #fffde0;
      color: #c0392b;
      font-weight: bold;
      padding: 3px 10px;
      border-radius: 10px;
      display: inline-block;
    }
    .empty-state {
      text-align: center;
      padding: 30px 20px;
      color: #bbb;
      font-size: 1.1rem;
    }

    /* Toast 訊息 */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 14px 28px;
      border-radius: 30px;
      font-size: 1.1rem;
      z-index: 200;
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2s forwards;
      white-space: nowrap;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    @keyframes toastIn {
      from { opacity:0; transform:translateX(-50%) translateY(20px); }
      to { opacity:1; transform:translateX(-50%) translateY(0); }
    }
    @keyframes toastOut {
      from { opacity:1; }
      to { opacity:0; transform:translateX(-50%) translateY(10px); }
    }

    /* 確認對話框 */
    .confirm-overlay {
      position: fixed;
      top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.5);
      z-index:150;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .confirm-box {
      background: #fff;
      border-radius: 28px;
      padding: 28px 24px;
      text-align: center;
      max-width: 340px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .confirm-box p {
      font-size: 1.2rem;
      margin-bottom: 24px;
      color: #3e3629;
    }
    .confirm-box .btn-row {
      display: flex;
      gap: 12px;
    }
    .confirm-box .btn-row button {
      flex: 1;
    }

    /* 訓放特殊按鈕 */
    .search-pigeon-btn {
      font-size: 1.2rem !important;
      background: #3e3629;
      color: #fff;
      padding: 16px;
      border-radius: 30px;
      width: 100%;
      margin-bottom: 16px;
      border: none;
      font-weight: bold;
    }

    /* 響應式微調 */
    @media (max-width: 400px) {
      .app {
        padding: 14px 10px;
      }
      h1 {
        font-size: 1.8rem;
      }
      .tab {
        font-size: 0.85rem;
        padding: 12px 4px;
      }
      input, select {
        padding: 12px 14px;
        font-size: 1rem;
      }
      .btn {
        font-size: 1.1rem;
        padding: 14px 18px;
      }
    }
  </style>
</head>
<body>
<div class="app" id="appRoot"></div>

<script>
  (function() {
    const APP_PASSWORD = "5678";
    const STORAGE_KEY = "pigeon_loft_elder_v1";
    const MAX_CHICKS_PER_PAIR = 10;
    const PEDIGREE_MAX_DEPTH = 3;

    // 簡單工具函數
    const escapeHtml = (str) => {
      if (!str && str !== 0) return '';
      const map = { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' };
      return String(str).replace(/[&<>"']/g, m => map[m]);
    };
    const genId = () => 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
    const showToast = (msg, duration = 2000) => {
      const existing = document.querySelector('.toast'); if (existing) existing.remove();
      const toast = document.createElement('div'); toast.className = 'toast'; toast.textContent = msg;
      document.body.appendChild(toast); setTimeout(() => toast.remove(), duration + 400);
    };
    const showConfirm = (message) => new Promise((resolve) => {
      const overlay = document.createElement('div'); overlay.className = 'confirm-overlay';
      overlay.innerHTML = `<div class="confirm-box"><p>${escapeHtml(message)}</p><div class="btn-row"><button class="btn-outline btn-sm" id="confirmCancel">取消</button><button class="btn btn-danger btn-sm" id="confirmOk">確認</button></div></div>`;
      document.body.appendChild(overlay);
      overlay.querySelector('#confirmCancel').addEventListener('click', () => { overlay.remove(); resolve(false); });
      overlay.querySelector('#confirmOk').addEventListener('click', () => { overlay.remove(); resolve(true); });
      overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); resolve(false); } });
    });
    const debounce = (fn, ms) => { let timer; return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); }; };

    let appData = { pigeons:[], pairs:[], medications:[], trainings:[] };
    let unlocked = false;
    let currentTab = 'pigeons';

    const loadData = () => {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const parsed = JSON.parse(saved);
          if (parsed && Array.isArray(parsed.pigeons) && Array.isArray(parsed.pairs)) appData = parsed;
          else initDefaultData();
        } else initDefaultData();
      } catch(e) { console.warn('資料載入失敗', e); initDefaultData(); }
    };
    const initDefaultData = () => {
      appData = {
        pigeons: [
          { ring:'2020-基石雄', name:'基石雄', year:'2020', sex:'公', color:'灰', eye:'黃眼', strain:'詹森', note:'基礎種雄', race:'', rank:'', sire:'', dam:'' },
          { ring:'2020-基石雌', name:'基石雌', year:'2020', sex:'母', color:'斑', eye:'砂眼', strain:'凡布利安娜', note:'基礎種雌', race:'', rank:'', sire:'', dam:'' },
          { ring:'2022-閃電號', name:'閃電號', year:'2022', sex:'公', color:'銀', eye:'黃眼', strain:'混合', note:'直子', race:'春季大賽', rank:'冠軍', sire:'2020-基石雄', dam:'2020-基石雌' }
        ],
        pairs: [{ id:'p1', maleRing:'2020-基石雄', femaleRing:'2020-基石雌', date:'2023-02-14', nestBox:'A-01', grandSire:'', grandDam:'', grandSireOut:'', grandDamOut:'', chicks:[{ seq:1, birthDate:'2023-03-20', year:'2023', ring:'2023-001', color:'灰', sex:'公', eye:'黃眼', strain:'', race:'', rank:'', note:'' }] }],
        medications: [],
        trainings: []
      };
      saveData();
    };
    const saveData = () => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); } catch(e) { showToast('⚠️ 儲存空間不足'); } };
    const findPigeon = (q) => { if (!q) return null; return appData.pigeons.find(p => p.ring === q || p.name === q) || null; };
    const searchPigeons = (keyword) => {
      if (!keyword) return [];
      const exact = findPigeon(keyword);
      if (exact) return [exact];
      const lower = keyword.toLowerCase();
      return appData.pigeons.filter(p => [p.year,p.name,p.sex,p.color,p.eye,p.race,p.rank,p.ring,p.strain,p.note].some(f => f && String(f).toLowerCase().includes(lower)));
    };
    const getStats = () => ({ total: appData.pigeons.length, male: appData.pigeons.filter(p=>p.sex==='公').length, female: appData.pigeons.filter(p=>p.sex==='母').length });

    const openModal = (title, contentHtml, onSave, options = {}) => {
      const { saveLabel='儲存', cancelLabel='取消', showSave=true } = options;
      const overlay = document.createElement('div'); overlay.className = 'modal-overlay open';
      overlay.innerHTML = `<div class="modal"><h3>${escapeHtml(title)}</h3><div class="modal-body">${contentHtml}</div><div class="modal-actions"><button class="btn-outline btn-sm" id="modalCancel">${escapeHtml(cancelLabel)}</button>${showSave?`<button class="btn btn-sm" id="modalSave">${escapeHtml(saveLabel)}</button>`:''}</div></div>`;
      document.body.appendChild(overlay);
      const close = () => { overlay.remove(); };
      overlay.querySelector('#modalCancel')?.addEventListener('click', close);
      if (showSave) overlay.querySelector('#modalSave')?.addEventListener('click', () => { if(onSave) onSave(close); else close(); });
      overlay.addEventListener('click', (e) => { if(e.target===overlay) close(); });
      const escHandler = (e) => { if(e.key==='Escape'){ close(); document.removeEventListener('keydown', escHandler); } };
      document.addEventListener('keydown', escHandler);
      return { overlay, close };
    };
    const showPigeonSelector = (title, callback) => {
      const contentHtml = `<input type="text" id="selectorSearch" placeholder="🔍 輸入環號或關鍵字" style="font-size:1.2rem;"><div id="selectorResults" style="max-height:300px;overflow-y:auto;margin-top:12px;"></div>`;
      const { overlay, close } = openModal(title, contentHtml, null, { showSave:false, cancelLabel:'關閉' });
      const searchInput = overlay.querySelector('#selectorSearch');
      const resultsDiv = overlay.querySelector('#selectorResults');
      const doSearch = () => {
        const q = searchInput.value.trim();
        if (!q) { resultsDiv.innerHTML = '<div class="empty-state">🔍 請輸入查詢條件</div>'; return; }
        const results = searchPigeons(q);
        if (results.length===0) { resultsDiv.innerHTML = '<div class="empty-state">❌ 找不到符合的鴿子</div>'; return; }
        resultsDiv.innerHTML = results.map(p => `<div class="search-select-item" style="padding:12px; border-bottom:1px solid #eee; cursor:pointer;" data-ring="${escapeHtml(p.ring)}"><strong>${escapeHtml(p.ring)}</strong> ${escapeHtml(p.name)} | ${escapeHtml(p.sex)} | ${escapeHtml(p.color)}</div>`).join('');
        resultsDiv.querySelectorAll('.search-select-item').forEach(el => el.addEventListener('click', () => { const pigeon = findPigeon(el.dataset.ring); if(pigeon){ callback(pigeon); close(); } }));
      };
      searchInput.addEventListener('input', debounce(doSearch, 300));
      setTimeout(() => searchInput.focus(), 150);
    };

    const appRoot = document.getElementById('appRoot');
    const TAB_CONFIG = [
      { key:'pigeons', label:'🐦 鴿子' }, { key:'pedigree', label:'📋 血統' },
      { key:'pairing', label:'💞 配對' }, { key:'medication', label:'💊 藥物' },
      { key:'training', label:'🚀 訓放' }, { key:'backup', label:'💾 備份' }
    ];

    const renderApp = () => {
      if (!unlocked) { renderLockScreen(); return; }
      renderMainLayout();
      switchTab(currentTab);
      updateStatsDisplay();
    };
    const renderLockScreen = () => {
      appRoot.innerHTML = `<div style="text-align:center;margin-top:50px;"><h1>🕊️ 鴿舍管家</h1><p style="font-size:1.3rem;color:#7b6e5d;margin-bottom:24px;">請輸入管理密碼</p><input type="password" id="pinInput" placeholder="····" maxlength="10" style="font-size:2rem;letter-spacing:8px;text-align:center;width:180px;margin:0 auto 16px;"><button class="btn" id="loginBtn" style="width:180px;margin:0 auto;">進入系統</button><p style="font-size:1rem;color:#bbb;margin-top:16px;">預設密碼：1234</p></div>`;
      const pinInput = document.getElementById('pinInput');
      const attemptLogin = () => { if(pinInput.value===APP_PASSWORD){ unlocked=true; renderApp(); } else { showToast('❌ 密碼錯誤'); pinInput.value=''; pinInput.focus(); } };
      document.getElementById('loginBtn').addEventListener('click', attemptLogin);
      pinInput.addEventListener('keydown', (e) => { if(e.key==='Enter') attemptLogin(); });
      setTimeout(() => pinInput?.focus(), 200);
    };
    const renderMainLayout = () => {
      appRoot.innerHTML = `
        <div class="header-row">
          <h1>🕊️ 鴿舍管家</h1>
          <button class="btn-outline btn-sm" id="logoutBtn">🔒 鎖定</button>
        </div>
        <div class="stats-box" id="statsDisplay"></div>
        <div class="tab-bar" id="tabBar"></div>
        <div id="panelContainer"></div>`;
      const tabBar = document.getElementById('tabBar');
      TAB_CONFIG.forEach(t => { const btn = document.createElement('button'); btn.className = 'tab'+(t.key===currentTab?' active':''); btn.dataset.tab = t.key; btn.textContent = t.label; btn.addEventListener('click', ()=> switchTab(t.key)); tabBar.appendChild(btn); });
      const panelContainer = document.getElementById('panelContainer');
      TAB_CONFIG.forEach(t => { const div = document.createElement('div'); div.className = 'panel'+(t.key===currentTab?' active':''); div.id = 'panel_'+t.key; panelContainer.appendChild(div); });
      document.getElementById('logoutBtn').addEventListener('click', ()=>{ unlocked=false; currentTab='pigeons'; renderApp(); });
    };
    const switchTab = (tabKey) => {
      currentTab = tabKey;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tabKey));
      document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id==='panel_'+tabKey));
      renderPanel(tabKey);
      if(tabKey==='pigeons') updateStatsDisplay();
    };
    const renderPanel = (tabKey) => {
      const map = { pigeons: renderPigeonsPanel, pedigree: renderPedigreePanel, pairing: renderPairingPanel, medication: renderMedicationPanel, training: renderTrainingPanel, backup: renderBackupPanel };
      const fn = map[tabKey]; if(fn) fn();
    };
    const updateStatsDisplay = () => { const el = document.getElementById('statsDisplay'); if(!el) return; const s = getStats(); el.textContent = `鴿子總數：${s.total}  公：${s.male}  母：${s.female}`; };

    // 鴿子列表渲染
    const renderPigeonsPanel = () => {
      const panel = document.getElementById('panel_pigeons'); if(!panel) return;
      panel.innerHTML = `<div class="card"><button class="btn" id="addPigeonBtn">➕ 新增鴿子</button></div><div id="pigeonList"></div>`;
      renderPigeonList();
      document.getElementById('addPigeonBtn').addEventListener('click', ()=> openPigeonEditor(null));
    };
    const renderPigeonList = () => {
      const listEl = document.getElementById('pigeonList'); if(!listEl) return;
      if(appData.pigeons.length===0){ listEl.innerHTML = '<div class="empty-state">尚無鴿子，點擊上方按鈕新增</div>'; return; }
      listEl.innerHTML = appData.pigeons.map((p,i) => `
        <div class="pigeon-item" data-ring="${escapeHtml(p.ring)}">
          <div class="item-actions">
            <button class="icon-btn edit-pigeon">✏️</button>
            <button class="icon-btn del-pigeon">🗑️</button>
          </div>
          <strong><span class="highlight-ring">${escapeHtml(p.ring)}</span></strong> (${escapeHtml(p.year||'')})<br>
          ${escapeHtml(p.name)} | ${escapeHtml(p.sex)} | ${escapeHtml(p.color)} | ${escapeHtml(p.eye)}<br>
          <small>血統:${escapeHtml(p.strain||'')} | 賽事:${escapeHtml(p.race||'-')}</small>
        </div>`).join('');
      listEl.addEventListener('click', (e) => {
        const item = e.target.closest('.pigeon-item'); if(!item) return;
        const ring = item.dataset.ring;
        if(e.target.closest('.edit-pigeon')){ const pigeon = findPigeon(ring); if(pigeon) openPigeonEditor(pigeon); }
        else if(e.target.closest('.del-pigeon')) deletePigeon(ring);
      });
    };
    const deletePigeon = async (ring) => { if(await showConfirm(`確定刪除「${ring}」？`)){ appData.pigeons = appData.pigeons.filter(p=>p.ring!==ring); saveData(); renderPigeonList(); updateStatsDisplay(); showToast('🗑️ 已刪除'); } };
    const openPigeonEditor = (pigeon=null) => {
      const isNew = !pigeon;
      const d = isNew ? { year:'',ring:'',name:'',sex:'公',color:'',eye:'',strain:'',race:'',rank:'',sire:'',dam:'',note:'' } : {...pigeon};
      const contentHtml = `
        <label>足環號碼*</label><input id="fRing" value="${escapeHtml(d.ring)}" ${isNew?'':'readonly'}>
        <label>暱稱</label><input id="fName" value="${escapeHtml(d.name)}">
        <label>年份</label><input id="fYear" value="${escapeHtml(d.year)}">
        <label>性別</label><select id="fSex"><option value="公" ${d.sex==='公'?'selected':''}>公</option><option value="母" ${d.sex==='母'?'selected':''}>母</option></select>
        <label>羽色</label><input id="fColor" value="${escapeHtml(d.color)}">
        <label>眼砂</label><input id="fEye" value="${escapeHtml(d.eye)}">
        <label>血統</label><input id="fStrain" value="${escapeHtml(d.strain)}">
        <label>賽事</label><input id="fRace" value="${escapeHtml(d.race)}">
        <label>名次</label><input id="fRank" value="${escapeHtml(d.rank)}">
        <label>父鴿環號</label><input id="fSire" value="${escapeHtml(d.sire)}">
        <label>母鴿環號</label><input id="fDam" value="${escapeHtml(d.dam)}">
        <label>備註</label><input id="fNote" value="${escapeHtml(d.note)}">`;
      openModal(isNew?'新增鴿子':'編輯鴿子', contentHtml, (closeFn)=>{
        const ring = document.getElementById('fRing').value.trim(); if(!ring){ showToast('⚠️ 環號必填'); return; }
        if(isNew && findPigeon(ring)){ showToast('⚠️ 環號已存在'); return; }
        const data = { ring, name: document.getElementById('fName').value.trim()||ring, year: document.getElementById('fYear').value.trim(), sex: document.getElementById('fSex').value, color: document.getElementById('fColor').value.trim(), eye: document.getElementById('fEye').value.trim(), strain: document.getElementById('fStrain').value.trim(), race: document.getElementById('fRace').value.trim(), rank: document.getElementById('fRank').value.trim(), sire: document.getElementById('fSire').value.trim(), dam: document.getElementById('fDam').value.trim(), note: document.getElementById('fNote').value.trim() };
        if(isNew) appData.pigeons.push(data); else Object.assign(pigeon, data);
        saveData(); renderPigeonList(); updateStatsDisplay(); showToast(isNew?'✅ 已新增':'✅ 已更新'); closeFn();
      });
    };

    // 血統面板 (簡化)
    const renderPedigreePanel = () => {
      const panel = document.getElementById('panel_pedigree'); if(!panel) return;
      panel.innerHTML = `<div class="card"><input type="text" id="pedigreeSearch" placeholder="🔍 輸入環號查血統或子女"></div><div id="pedigreeResult"></div>`;
      const searchInput = document.getElementById('pedigreeSearch');
      const resultEl = document.getElementById('pedigreeResult');
      const handleSearch = (q) => {
        if(!q){ resultEl.innerHTML=''; return; }
        const pigeon = findPigeon(q);
        if(pigeon){ showPedigreeInfo(pigeon); return; }
        const results = searchPigeons(q);
        if(results.length===0) resultEl.innerHTML='<div class="empty-state">找不到鴿子</div>';
        else resultEl.innerHTML = results.map(p => `<div class="pigeon-item" data-ring="${escapeHtml(p.ring)}"><strong>${escapeHtml(p.ring)}</strong> ${escapeHtml(p.name)}</div>`).join('');
      };
      const showPedigreeInfo = (p) => {
        const sire = findPigeon(p.sire); const dam = findPigeon(p.dam);
        resultEl.innerHTML = `<div class="card"><strong>${escapeHtml(p.ring)}</strong> 血統<br>父：${escapeHtml(p.sire||'基礎')} ${sire?`(${escapeHtml(sire.color)})`:''}<br>母：${escapeHtml(p.dam||'基礎')} ${dam?`(${escapeHtml(dam.color)})`:''}</div>`;
      };
      searchInput.addEventListener('input', debounce(()=>handleSearch(searchInput.value.trim()), 400));
    };

    // 配對面板 (簡化)
    const renderPairingPanel = () => {
      const panel = document.getElementById('panel_pairing'); if(!panel) return;
      panel.innerHTML = `<div class="card"><button class="btn" id="addPairBtn">➕ 新增配對</button></div><div id="pairList"></div>`;
      renderPairList();
      document.getElementById('addPairBtn').addEventListener('click', ()=> openPairEditor(null));
    };
    const renderPairList = () => {
      const listEl = document.getElementById('pairList'); if(!listEl) return;
      if(appData.pairs.length===0){ listEl.innerHTML='<div class="empty-state">尚無配對</div>'; return; }
      listEl.innerHTML = appData.pairs.map(p => `<div class="pair-item" data-pair-id="${escapeHtml(p.id)}"><div class="item-actions"><button class="icon-btn edit-pair-btn">✏️</button><button class="icon-btn del-pair-btn">🗑️</button></div><strong>${escapeHtml(p.maleRing)}</strong> ❤️ <strong>${escapeHtml(p.femaleRing)}</strong><br>📅 ${escapeHtml(p.date)} 🏠 ${escapeHtml(p.nestBox)}<br>幼鴿 ${p.chicks?.length||0}羽 <button class="btn-sm btn-outline chicks-btn">🐣管理</button></div>`).join('');
      listEl.addEventListener('click', (e) => { const item=e.target.closest('.pair-item'); if(!item) return; const pair=appData.pairs.find(p=>p.id===item.dataset.pairId); if(!pair) return; if(e.target.closest('.edit-pair-btn')) openPairEditor(pair); else if(e.target.closest('.del-pair-btn')) deletePair(pair); else if(e.target.closest('.chicks-btn')) openChicksManager(pair); });
    };
    const deletePair = async (pair) => { if(await showConfirm('刪除此配對？')){ appData.pairs=appData.pairs.filter(p=>p.id!==pair.id); saveData(); renderPairList(); showToast('🗑️ 已刪除'); } };
    const openPairEditor = (pair=null) => {
      const d = pair || { maleRing:'',femaleRing:'',date:'',nestBox:'A-01',grandSire:'',grandDam:'',grandSireOut:'',grandDamOut:'' };
      const [na,nn] = (d.nestBox||'A-01').split('-');
      const contentHtml = `
        <label>公鴿</label><div style="display:flex;gap:8px;"><input id="fMaleRing" value="${escapeHtml(d.maleRing)}"><button class="btn-sm btn-outline" id="searchMaleBtn">🔍</button></div>
        <label>母鴿</label><div style="display:flex;gap:8px;"><input id="fFemaleRing" value="${escapeHtml(d.femaleRing)}"><button class="btn-sm btn-outline" id="searchFemaleBtn">🔍</button></div>
        <label>配對日期</label><input type="date" id="fDate" value="${escapeHtml(d.date)}">
        <label>巢箱</label><div style="display:flex;gap:8px;"><select id="fNestAlpha">${'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(l=>`<option value="${l}" ${l===na?'selected':''}>${l}</option>`).join('')}</select><span>-</span><select id="fNestNum">${[...Array(9)].map((_,i)=>`<option value="${String(i+1).padStart(2,'0')}" ${String(i+1).padStart(2,'0')===nn?'selected':''}>${i+1}</option>`).join('')}</select></div>`;
      openModal(pair?'編輯配對':'新增配對', contentHtml, (closeFn)=>{
        const mRing=document.getElementById('fMaleRing').value.trim(), fRing=document.getElementById('fFemaleRing').value.trim();
        if(!mRing||!fRing){ showToast('⚠️ 公母鴿必填'); return; }
        const data = { id: pair?.id||genId(), maleRing:mRing, femaleRing:fRing, date:document.getElementById('fDate').value, nestBox:document.getElementById('fNestAlpha').value+'-'+document.getElementById('fNestNum').value, grandSire:'', grandDam:'', grandSireOut:'', grandDamOut:'', chicks: pair?.chicks||[] };
        if(!pair) appData.pairs.push(data); else Object.assign(pair, data);
        saveData(); renderPairList(); showToast('✅ 已儲存'); closeFn();
      });
      setTimeout(()=>{ document.getElementById('searchMaleBtn')?.addEventListener('click',()=>showPigeonSelector('公鴿',p=>{ document.getElementById('fMaleRing').value=p.ring; })); document.getElementById('searchFemaleBtn')?.addEventListener('click',()=>showPigeonSelector('母鴿',p=>{ document.getElementById('fFemaleRing').value=p.ring; })); },100);
    };
    const openChicksManager = (pair) => {
      let html = `<div class="table-scroll"><table><tr><th>序號</th><th>環號</th><th>性別</th><th>羽色</th><th>眼砂</th><th></th></tr><tbody id="chicksTbody">`;
      (pair.chicks||[]).forEach(c => { html += `<tr data-seq="${c.seq}"><td>${c.seq}</td><td><input value="${escapeHtml(c.ring||'')}" class="cRing"></td><td><select class="cSex"><option value="公" ${c.sex==='公'?'selected':''}>公</option><option value="母" ${c.sex==='母'?'selected':''}>母</option></select></td><td><input value="${escapeHtml(c.color||'')}" class="cColor"></td><td><input value="${escapeHtml(c.eye||'')}" class="cEye"></td><td><button class="btn-xs btn-danger del-chick-row">✕</button></td></tr>`; });
      html += `</tbody></table></div>${(pair.chicks||[]).length < MAX_CHICKS_PER_PAIR ? `<button class="btn btn-sm" id="addChickRowBtn">➕ 新增幼鴿</button>` : ''}`;
      openModal('幼鴿管理', html, (closeFn)=>{
        const rows = document.querySelectorAll('#chicksTbody tr'); const newChicks = []; let seq=1;
        rows.forEach(row => { const ring = row.querySelector('.cRing')?.value?.trim(); if(!ring) return;
          const sex=row.querySelector('.cSex')?.value||'公', color=row.querySelector('.cColor')?.value||'', eye=row.querySelector('.cEye')?.value||'';
          if(!findPigeon(ring)) appData.pigeons.push({ring,name:ring,sex,color,eye,sire:pair.maleRing,dam:pair.femaleRing});
          newChicks.push({seq:seq++, ring, sex, color, eye}); });
        pair.chicks = newChicks; saveData(); renderPairList(); renderPigeonList(); updateStatsDisplay(); showToast('✅ 幼鴿已儲存'); closeFn();
      });
    };

    // 藥物面板
    const renderMedicationPanel = () => {
      const panel = document.getElementById('panel_medication'); if(!panel) return;
      panel.innerHTML = `<div class="card"><label>環號</label><div style="display:flex;gap:8px;"><input id="medRing"><button class="btn-sm btn-outline" id="searchMedBtn">🔍</button></div><label>開始日期</label><input type="date" id="medStartDate"><label>事由</label><input id="medReason"><label>處方</label><input id="medPrescription"><label>劑量</label><input id="medDosage"><label>結束日期</label><input type="date" id="medEndDate"><label>結果</label><input id="medResult"><button class="btn" id="saveMedBtn">💾 記錄</button></div><div id="medList"></div>`;
      renderMedList();
      document.getElementById('searchMedBtn').addEventListener('click',()=>showPigeonSelector('鴿子',p=>{ document.getElementById('medRing').value=p.ring; }));
      document.getElementById('saveMedBtn').addEventListener('click',()=>{
        const ring=document.getElementById('medRing').value.trim(), start=document.getElementById('medStartDate').value;
        if(!ring||!start){ showToast('⚠️ 環號與日期必填'); return; }
        appData.medications.push({ring,startDate:start,endDate:document.getElementById('medEndDate').value,reason:document.getElementById('medReason').value.trim(),prescription:document.getElementById('medPrescription').value.trim(),dosage:document.getElementById('medDosage').value.trim(),result:document.getElementById('medResult').value.trim()});
        saveData(); renderMedList(); ['medRing','medStartDate','medEndDate','medReason','medPrescription','medDosage','medResult'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; }); showToast('✅ 已記錄');
      });
    };
    const renderMedList = () => {
      const listEl = document.getElementById('medList'); if(!listEl) return;
      if(appData.medications.length===0){ listEl.innerHTML='<h3>歷史記錄</h3><div class="empty-state">尚無記錄</div>'; return; }
      let html='<h3>歷史記錄</h3>';
      [...appData.medications].reverse().forEach((m,i)=>{ html+=`<div class="med-item" data-med-real-idx="${appData.medications.length-1-i}"><strong>${escapeHtml(m.ring)}</strong><button class="icon-btn del-med-btn" style="float:right;">🗑️</button><br>🗓️ ${escapeHtml(m.startDate||'?')}~${escapeHtml(m.endDate||'?')}<br>${escapeHtml(m.reason||'')} / ${escapeHtml(m.prescription||'')}</div>`; });
      listEl.innerHTML=html;
      listEl.querySelectorAll('.del-med-btn').forEach(btn=>btn.addEventListener('click',()=>{ const idx=parseInt(btn.closest('.med-item').dataset.medRealIdx); if(!isNaN(idx)){ appData.medications.splice(idx,1); saveData(); renderMedList(); showToast('🗑️ 已刪除'); } }));
    };

    // 訓放面板 (簡化大字版)
    const renderTrainingPanel = () => {
      const panel = document.getElementById('panel_training'); if(!panel) return;
      panel.innerHTML = `
        <div class="card">
          <label>訓放次數</label><select id="tSession">${[...Array(10)].map((_,i)=>`<option value="${i+1}">第 ${i+1} 次</option>`).join('')}</select>
          <label>地點</label><input id="tLocation" placeholder="例如：基隆港">
          <label>放訓日期</label><input type="date" id="tDate">
          <label>放訓時間</label><div style="display:flex;gap:8px;"><input type="time" id="tTime" style="flex:2;"><button class="btn-outline btn-sm" id="setTimeNow" style="flex:1;">⏱️ 現在</button></div>
          <button class="search-pigeon-btn" id="searchPigeonForTrainingBtn">🔍 點擊搜索鴿子加入訓放</button>
          <div id="tempTrainingTable"></div>
          <button class="btn" id="saveTrainingBtn">💾 儲存本次訓放</button>
        </div>
        <div id="trainingList"></div>`;

      let tempEntries = [];
      const renderTempTable = () => {
        const container = document.getElementById('tempTrainingTable');
        if (!container) return;
        if (tempEntries.length === 0) {
          container.innerHTML = '<div class="empty-state">尚無鴿子，請點擊上方按鈕搜索加入</div>';
          return;
        }
        let html = `<div class="table-scroll"><table><tr><th>環號</th><th>性別</th><th>羽色</th><th>眼砂</th><th>歸巢時間</th><th></th></tr><tbody>`;
        tempEntries.forEach((e, idx) => {
          html += `<tr><td><span class="highlight-ring">${escapeHtml(e.ring)}</span></td><td>${escapeHtml(e.sex)}</td><td>${escapeHtml(e.color)}</td><td>${escapeHtml(e.eye)}</td><td>${escapeHtml(e.returnTime)} <button class="btn-xs now-time-btn">⏱️</button></td><td><button class="btn-xs btn-danger del-temp-btn">✕</button></td></tr>`;
        });
        html += `</tbody></table></div>`;
        container.innerHTML = html;
        container.querySelectorAll('.now-time-btn').forEach((btn, i) => btn.addEventListener('click', () => { const now=new Date(); tempEntries[i].returnTime = [now.getHours(),now.getMinutes()].map(n=>String(n).padStart(2,'0')).join(':'); renderTempTable(); }));
        container.querySelectorAll('.del-temp-btn').forEach((btn, i) => btn.addEventListener('click', () => { tempEntries.splice(i,1); renderTempTable(); }));
      };
      renderTempTable();

      document.getElementById('searchPigeonForTrainingBtn').addEventListener('click', () => {
        showPigeonSelector('選擇訓放鴿子', pigeon => {
          tempEntries.push({ ring: pigeon.ring, sex: pigeon.sex||'公', color: pigeon.color||'', eye: pigeon.eye||'', returnTime: '' });
          renderTempTable();
          showToast('✅ 已加入，請設定歸巢時間後儲存');
        });
      });
      document.getElementById('setTimeNow').addEventListener('click', () => { const now=new Date(); document.getElementById('tTime').value = [now.getHours(),now.getMinutes()].map(n=>String(n).padStart(2,'0')).join(':'); });
      document.getElementById('saveTrainingBtn').addEventListener('click', () => {
        const session=document.getElementById('tSession').value, location=document.getElementById('tLocation').value.trim(), dateVal=document.getElementById('tDate').value, timeVal=document.getElementById('tTime').value;
        if(!location||!dateVal||!timeVal){ showToast('⚠️ 請填寫地點、日期和時間'); return; }
        if(tempEntries.length===0){ showToast('⚠️ 至少加入一羽鴿子'); return; }
        appData.trainings.push({ id:genId(), session, location, time: dateVal+'T'+timeVal, entries: tempEntries.map(e=>({...e, note:''})) });
        saveData(); renderTrainingList();
        document.getElementById('tLocation').value=''; document.getElementById('tDate').value=''; document.getElementById('tTime').value=''; tempEntries=[]; renderTempTable(); showToast('✅ 訓放已儲存');
      });
      renderTrainingList();
    };
    const renderTrainingList = () => {
      const listEl = document.getElementById('trainingList'); if(!listEl) return;
      if(appData.trainings.length===0){ listEl.innerHTML='<h3>訓放紀錄</h3><div class="empty-state">尚無記錄</div>'; return; }
      let html='<h3>訓放紀錄</h3>';
      [...appData.trainings].reverse().forEach(t => {
        const [date, time] = t.time.split('T');
        html += `<div class="pigeon-item" data-training-id="${escapeHtml(t.id)}"><strong>第${escapeHtml(t.session)}次</strong> ${escapeHtml(t.location)}<br>📅 ${escapeHtml(date)} ⏱️ ${escapeHtml(time)}<button class="icon-btn del-train-btn" style="float:right;">🗑️</button><div class="table-scroll"><table><tr><th>環號</th><th>性別</th><th>羽色</th><th>眼砂</th><th>歸巢時間</th></tr><tbody>${t.entries.map((e,idx)=>`<tr><td>${escapeHtml(e.ring)}</td><td>${escapeHtml(e.sex)}</td><td>${escapeHtml(e.color)}</td><td>${escapeHtml(e.eye)}</td><td>${escapeHtml(e.returnTime)} <button class="btn-xs now-record-btn" data-train-id="${escapeHtml(t.id)}" data-entry-index="${idx}">⏱️</button></td></tr>`).join('')}</tbody></table></div></div>`;
      });
      listEl.innerHTML=html;
      listEl.querySelectorAll('.del-train-btn').forEach(btn=>btn.addEventListener('click', async ()=>{ if(await showConfirm('刪除此訓放？')){ const id=btn.closest('.pigeon-item').dataset.trainingId; appData.trainings=appData.trainings.filter(t=>t.id!==id); saveData(); renderTrainingList(); showToast('🗑️ 已刪除'); } }));
      listEl.querySelectorAll('.now-record-btn').forEach(btn=>btn.addEventListener('click', ()=>{ const trainId=btn.dataset.trainId, idx=parseInt(btn.dataset.entryIndex); const training=appData.trainings.find(t=>t.id===trainId); if(training?.entries[idx]){ const now=new Date(); training.entries[idx].returnTime=[now.getHours(),now.getMinutes()].map(n=>String(n).padStart(2,'0')).join(':'); saveData(); renderTrainingList(); showToast('⏱️ 時間已記錄'); } }));
    };

    // 備份面板
    const renderBackupPanel = () => {
      const panel = document.getElementById('panel_backup'); if(!panel) return;
      panel.innerHTML = `<div class="card"><button class="btn" id="exportBtn">📤 下載備份檔案</button></div><div class="card"><input type="file" id="importFile" accept=".json" style="font-size:1rem;"><button class="btn btn-outline" id="importBtn">📥 還原資料</button></div>`;
      document.getElementById('exportBtn').addEventListener('click',()=>{ const blob=new Blob([JSON.stringify(appData,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`鴿舍備份_${new Date().toISOString().slice(0,10)}.json`; a.click(); showToast('✅ 已下載'); });
      document.getElementById('importBtn').addEventListener('click',async()=>{ const file=document.getElementById('importFile').files[0]; if(!file){ showToast('⚠️ 請選擇檔案'); return; } if(!await showConfirm('還原將覆蓋現有資料，確定？')) return; try { const text=await file.text(); const data=JSON.parse(text); if(data&&Array.isArray(data.pigeons)){ appData=data; saveData(); renderApp(); showToast('✅ 還原成功'); } else showToast('⚠️ 格式不符'); } catch(e){ showToast('⚠️ 讀取失敗'); } });
    };

    loadData();
    renderApp();
    window.__pigeonApp = { getData:()=>appData, resetData:()=>{ initDefaultData(); saveData(); renderApp(); } };
  })();
</script>
</body>
</html>
